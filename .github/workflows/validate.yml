name: Validate Specs

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  gemini-freshness:
    name: GEMINI.md Freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Regenerate GEMINI.md
        run: node scripts/generate_gemini.js
      - name: Check for drift
        run: |
          if ! git diff --exit-code GEMINI.md; then
            echo "::error::GEMINI.md is stale. Run 'node scripts/generate_gemini.js' and commit the result."
            exit 1
          fi

  agent-spec-structure:
    name: Agent Spec Structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate required sections
        run: |
          failed=0
          required_sections=("## Role" "## Tone" "## Capabilities" "## Rules & Constraints" "## Boundaries")

          for spec in $(find agents -name '*.md' -not -name 'README.md'); do
            # Check H1 format: # Name — Domain Agent
            if ! head -1 "$spec" | grep -qP '^# .+ — .+ Agent$'; then
              echo "::error file=$spec::H1 must match '# {Name} — {Domain} Agent'"
              failed=1
            fi

            for section in "${required_sections[@]}"; do
              if ! grep -q "^${section}" "$spec"; then
                echo "::error file=$spec::Missing required section: $section"
                failed=1
              fi
            done
          done

          if [ "$failed" -eq 1 ]; then
            exit 1
          fi
          echo "All agent specs pass structural validation."

  docs-mirror:
    name: Docs Mirror Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify docs/agents/ mirrors agents/
        run: |
          failed=0
          for domain in $(find agents -mindepth 1 -maxdepth 1 -type d -printf '%f\n'); do
            if [ ! -d "docs/agents/$domain" ]; then
              echo "::error::Missing docs mirror: docs/agents/$domain/ does not exist"
              failed=1
            fi
          done

          if [ "$failed" -eq 1 ]; then
            exit 1
          fi
          echo "All agent domains have matching docs/agents/ directories."
